<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OurCraft Studio - World Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">⏰</span>
                <h1>OurCraft Studio</h1>
            </div>
            <p class="tagline">World Clock</p>
        </header>

        <!-- Clocks Grid -->
        <main class="clocks-grid" id="clocks-grid">
            <!-- Member clock cards will be generated by JavaScript -->
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2024 OurCraft Studio. Times update automatically with daylight savings.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
